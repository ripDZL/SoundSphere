name: Build extension

on:
  push:
  workflow_dispatch:

permissions:
  contents: write   # lets the CI bot publish builds (uses GitHub's own token)

concurrency:
  group: beta-build
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package builds (Chrome .zip + Firefox .xpi)
        run: |
          set -euo pipefail
          shopt -s nullglob
          mkdir -p beta
          for d in Chrome/*/SoundSphere; do
            v=$(echo "$d" | cut -d/ -f2)
            (cd "$d" && zip -rq "$GITHUB_WORKSPACE/beta/SoundSphere-chrome-${v}.zip" . -x "*.DS_Store")
          done
          for d in FireFox/*/SoundSphere; do
            v=$(echo "$d" | cut -d/ -f2)
            (cd "$d" && zip -rq "$GITHUB_WORKSPACE/beta/SoundSphere-firefox-${v}.xpi" . -x "*.DS_Store")
          done
          ls -l beta

      - name: Commit builds to beta/
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git add beta
          if git diff --cached --quiet; then
            echo "No build changes to commit."
          else
            git commit -m "ci: update beta builds [skip ci]"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
